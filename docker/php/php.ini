; ===================================
; AUKCIJSKA PLATFORMA - PHP CONFIGURATION
; ===================================
; Custom php.ini for production-grade settings

; -----------------------------------
; GENERAL SETTINGS
; -----------------------------------
expose_php = Off
max_execution_time = 60
max_input_time = 120
memory_limit = 512M
upload_max_filesize = 20M
post_max_size = 25M
max_file_uploads = 20

; -----------------------------------
; ERROR HANDLING
; -----------------------------------
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/www/html/storage/logs/php_errors.log
error_reporting = E_ALL
html_errors = On

; -----------------------------------
; SECURITY
; -----------------------------------
disable_functions = exec,passthru,shell_exec,system,proc_open,popen,curl_exec,fsockopen
allow_url_fopen = Off
allow_url_include = Off
expose_php = Off

; Session security
session.cookie_httponly = 1
session.cookie_secure = 1
session.cookie_samesite = Lax
session.use_strict_mode = 1
session.gc_maxlifetime = 7200

; -----------------------------------
; TIMEZONE
; -----------------------------------
date.timezone = Europe/Sarajevo

; -----------------------------------
; OPCACHE (Production)
; -----------------------------------
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 60
opcache.validate_timestamps = 1
opcache.save_comments = 1
opcache.fast_shutdown = 0

; -----------------------------------
; REALPATH CACHE
; -----------------------------------
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; -----------------------------------
; MYSQL/PDO SETTINGS
; -----------------------------------
pdo_mysql.default_socket=
mysqli.default_socket=

; -----------------------------------
; POSTGRESQL SETTINGS
; -----------------------------------
pgsql.allow_persistent = On
pgsql.auto_reset_persistent = Off
pgsql.max_persistent = -1
pgsql.max_links = -1

; -----------------------------------
; REDIS SETTINGS
; -----------------------------------
redis.session.locking_enabled = 1
redis.session.lock_retries = -1
redis.session.lock_wait_time = 2

; -----------------------------------
; XDEBUG (Development only - disable in production)
; -----------------------------------
; xdebug.mode = debug
; xdebug.start_with_request = yes
; xdebug.client_host = host.docker.internal
; xdebug.client_port = 9003
; xdebug.log = /var/www/html/storage/logs/xdebug.log

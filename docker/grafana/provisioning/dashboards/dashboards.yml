# ===================================
# GRAFANA DASHBOARDS - PROVISIONING
# ===================================
# Auto-configure dashboard loading

apiVersion: 1

providers:
  - name: 'Aukcije Dashboards'
    orgId: 1
    folder: ''
    folderUid: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards

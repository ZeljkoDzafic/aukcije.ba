# ===================================
# AUKCIJSKA PLATFORMA - E2E WORKFLOW
# ===================================
# Runs Playwright E2E tests
# Can be triggered manually or on PR

name: E2E Tests

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'resources/**'
      - 'app/Http/**'
      - 'routes/**'
      - 'tests/e2e/**'
  workflow_dispatch:

jobs:
  # --------------------------------
  # Playwright Tests
  # --------------------------------
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: aukcije_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, gd, intl, pdo_pgsql, zip
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Install Node.js dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Setup Test Database
        run: php artisan migrate --force
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: ${{ job.services.postgres.ports['5432'] }}
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: ${{ job.services.redis.ports['6379'] }}

      - name: Seed Test Data
        run: php artisan db:seed --force
        env:
          DB_HOST: 127.0.0.1

      - name: Start Laravel Server
        run: php artisan serve --host=127.0.0.1 --port=8000 &
        env:
          DB_HOST: 127.0.0.1

      - name: Wait for Server
        run: sleep 5

      - name: Run Playwright Tests
        run: npx playwright test
        env:
          BASE_URL: http://127.0.0.1:8000
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:${{ job.services.postgres.ports['5432'] }}/aukcije_test

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: tests/e2e/screenshots/
          retention-days: 7

# ===================================
# AUKCIJSKA PLATFORMA - DEVELOPMENT
# ===================================
# Docker Compose for local development
# Usage: docker compose up -d
# Stop: docker compose down
# Rebuild: docker compose up -d --build

services:

  # --------------------------------
  # Laravel Application (PHP-FPM)
  # --------------------------------
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
      args:
        - USER_ID=${USERID:-1000}
        - GROUP_ID=${GROUPID:-1000}
    container_name: aukcije_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html:cached
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/php.ini
    networks:
      - aukcije_network
    depends_on:
      - postgres
      - redis
      - meilisearch
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - MEILISEARCH_HOST=http://meilisearch:7700
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # --------------------------------
  # Nginx Web Server
  # --------------------------------
  nginx:
    image: nginx:alpine
    container_name: aukcije_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./:/var/www/html:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - aukcije_network
    depends_on:
      - app

  # --------------------------------
  # PostgreSQL Database
  # --------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: aukcije_postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_DATABASE:-aukcije}
      POSTGRES_USER: ${DB_USERNAME:-aukcije}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-aukcije_secret_2024}
    networks:
      - aukcije_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-aukcije} -d ${DB_DATABASE:-aukcije}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------
  # Redis (Cache + Locks + Queue)
  # --------------------------------
  redis:
    image: redis:7-alpine
    container_name: aukcije_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - aukcije_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------
  # Meilisearch (Full-text Search)
  # --------------------------------
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: aukcije_meilisearch
    restart: unless-stopped
    ports:
      - "${MEILISEARCH_PORT:-7700}:7700"
    volumes:
      - meilisearch_data:/meili_data
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-meilisearch_master_key_2024}
      MEILI_ENV: development
    networks:
      - aukcije_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------
  # Laravel Reverb (WebSocket Server)
  # --------------------------------
  reverb:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: aukcije_reverb
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html:cached
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "${REVERB_PORT:-8080}:8080"
    networks:
      - aukcije_network
    depends_on:
      - app
      - redis
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis

  # --------------------------------
  # Laravel Horizon (Queue Worker)
  # --------------------------------
  horizon:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: aukcije_horizon
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html:cached
    command: php artisan horizon
    networks:
      - aukcije_network
    depends_on:
      - app
      - redis
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis

  # --------------------------------
  # Laravel Scheduler
  # --------------------------------
  scheduler:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: aukcije_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html:cached
    command: php artisan schedule:work
    networks:
      - aukcije_network
    depends_on:
      - app
      - postgres
      - redis

  # --------------------------------
  # Mailpit (Email Testing)
  # --------------------------------
  mailpit:
    image: axllent/mailpit:latest
    container_name: aukcije_mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_PORT:-1025}:1025"   # SMTP
      - "${MAILPIT_UI_PORT:-8025}:8025" # Web UI
    networks:
      - aukcije_network

  # --------------------------------
  # MinIO (S3-compatible Storage)
  # --------------------------------
  minio:
    image: minio/minio:latest
    container_name: aukcije_minio
    restart: unless-stopped
    ports:
      - "${MINIO_PORT:-9000}:9000"       # API
      - "${MINIO_CONSOLE_PORT:-9001}:9001" # Console
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    networks:
      - aukcije_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # --------------------------------
  # Create MinIO Bucket on Startup
  # --------------------------------
  minio_create_bucket:
    image: minio/mc:latest
    container_name: aukcije_minio_create_bucket
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
      mc mb myminio/${AWS_BUCKET:-aukcije-images} --ignore-existing;
      mc anonymous set download myminio/${AWS_BUCKET:-aukcije-images};
      exit 0;
      "
    networks:
      - aukcije_network

networks:
  aukcije_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  meilisearch_data:
    driver: local
  minio_data:
    driver: local
